<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>

    <div class="flex gap-4">

        <button onclick="addNumberToLS()" class="px-6 py-3 rounded-xl font-semibold text-white 
           bg-gradient-to-r from-green-500 to-green-600
           shadow-lg shadow-green-500/40
           hover:scale-105 hover:shadow-green-500/60
           active:scale-95 transition-all duration-300">
            Add To Store
        </button>

        <button onclick="gerNumberFromLS()" class="px-6 py-3 rounded-xl font-semibold text-white 
           bg-gradient-to-r from-blue-500 to-blue-600
           shadow-lg shadow-blue-500/40
           hover:scale-105 hover:shadow-blue-500/60
           active:scale-95 transition-all duration-300">
            Load To Store
        </button>

    </div>
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <div class="space-y-4">
            <h2 class="text-xl font-bold text-slate-800">Add New Product</h2>

            <div class="form-control w-full">
                <label class="label px-0 pt-0 pb-1.5">
                    <span class="label-text font-bold text-slate-600">Product Name</span>
                </label>
                <input type="text" id="product" placeholder="e.g. iPhone 15"
                    class="input input-bordered w-full bg-slate-50 border-slate-200 focus:outline-none focus:border-[#6610f2] rounded-xl placeholder:text-slate-400" />
            </div>

            <div class="form-control w-full">
                <label class="label px-0 pt-0 pb-1.5">
                    <span class="label-text font-bold text-slate-600">Quantity</span>
                </label>
                <input type="number" id="quantity" placeholder="0"
                    class="input input-bordered w-full bg-slate-50 border-slate-200 focus:outline-none focus:border-[#6610f2] rounded-xl placeholder:text-slate-400" />
            </div>

            <button onclick="addProduct()"
                class="btn w-full bg-[#6610f2] hover:bg-[#520dc2] text-white border-none normal-case text-lg font-bold rounded-xl shadow-md transition-all active:scale-95 mt-2 h-14">
                Add Product
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl border border-slate-100">


        <div class="divider opacity-50"></div>

        <div class="mt-6">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-2xl font-bold text-slate-800">Inventory</h1>
                <span class="badge badge-ghost font-mono">List</span>
            </div>

            <ul id="ShowProduct" class="space-y-2">

            </ul>
        </div>
    </div>

    <script src="./js/localStorage.js"></script>
</body>

</html>
